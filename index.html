<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>窗景 · Scenes Through Glass</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Inter:wght@300;400&display=swap');

    :root {
      --bg: #0a0a0a;
      --glass: rgba(255,255,255,0.06);
      --text: #d1d5db;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: var(--text);
      font-family: 'Inter', 'Noto Serif SC', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
      pointer-events: none;
      opacity: 0.14;           /* 调低了很多，让新背景的质量能真正显现 */
      mix-blend-mode: screen;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.45) 70%);
    }

    .ui {
      position: absolute;
      z-index: 10;
      pointer-events: auto;
    }

    .header {
      top: 32px;
      left: 40px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.6;
      font-weight: 400;
    }

    .title {
      top: 52px;
      left: 40px;
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: #f5f5f5;
    }

    .subtitle {
      top: 88px;
      left: 40px;
      font-size: 14px;
      opacity: 0.5;
    }

    .controls {
      bottom: 40px;
      left: 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e5e7eb;
      padding: 10px 18px;
      border-radius: 9999px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      backdrop-filter: blur(20px);
      pointer-events: auto;
      white-space: nowrap;
    }

    .btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.985);
    }

    .hint {
      position: absolute;
      bottom: 40px;
      right: 40px;
      font-size: 12px;
      opacity: 0.35;
      max-width: 260px;
      text-align: right;
      line-height: 1.5;
    }

    /* 场景选择器 - 优雅底部栏 */
    .scenes-bar, .weather-bar, .clarity-bar {
      position: absolute;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.38);
      padding: 6px 16px;
      border-radius: 9999px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12.5px;
    }
    .scenes-bar { bottom: 118px; }
    .clarity-bar { bottom: 78px; }
    .weather-bar { bottom: 36px; }

    .scenes-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-right: 6px;
      white-space: nowrap;
    }

    .scene-btn {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      color: #c9cdd3;
      white-space: nowrap;
    }
    .scene-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #f1f5f9;
    }
    .scene-btn.active {
      background: rgba(255,255,255,0.18);
      color: #f8fafc;
      font-weight: 500;
    }

    .weather-bar .btn {
      font-size: 12px;
      padding: 5px 13px;
    }
    .btn.ghost {
      opacity: 0.65;
      border-style: dashed;
    }

    /* 清晰度控制栏 */
    .clarity-bar {
      position: absolute;
      left: 40px;
      bottom: 78px;
    }
    .clarity-bar .btn {
      font-size: 11.5px;
      padding: 4px 11px;
    }

    /* 声音控制栏 - 移到右上角避免与底部UI重叠 */
    .audio-bar {
      position: absolute;
      top: 32px;
      right: 260px;   /* 放在语言切换器左边 */
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.42);
      padding: 5px 14px;
      border-radius: 9999px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: auto;
    }

    .audio-bar .sound-btn {
      font-size: 14px;
      padding: 3px 9px;
      border-radius: 9999px;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #e5e7eb;
      line-height: 1;
      transition: all 0.2s ease;
      user-select: none;
    }
    .audio-bar .sound-btn:hover {
      background: rgba(255,255,255,0.22);
    }
    .audio-bar .sound-btn.muted {
      opacity: 0.55;
    }

    .audio-bar input[type="range"] {
      width: 78px;
      accent-color: #a1a1aa;
      cursor: pointer;
    }

    .audio-label {
      font-size: 10.5px;
      opacity: 0.65;
      margin-right: 2px;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    /* 全屏按钮 - 右上角 */
    .fullscreen-btn {
      position: absolute;
      top: 32px;
      right: 40px;
      z-index: 20;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.12);
      color: #d1d5db;
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all 0.2s ease;
      user-select: none;
    }
    .fullscreen-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #f1f5f9;
      border-color: rgba(255,255,255,0.25);
    }

    /* 语言切换器 */
    .lang-switcher {
      position: absolute;
      top: 32px;
      right: 140px;
      z-index: 20;
      display: flex;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9999px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .lang-btn {
      padding: 5px 9px;
      font-size: 11px;
      cursor: pointer;
      color: #a1a1aa;
      transition: all 0.15s ease;
      user-select: none;
    }
    .lang-btn:hover {
      color: #e4e4e7;
      background: rgba(255,255,255,0.06);
    }
    .lang-btn.active {
      background: rgba(255,255,255,0.15);
      color: #f4f4f5;
      font-weight: 500;
    }

    .status {
      position: absolute;
      top: 40px;
      right: 40px;
      font-size: 12px;
      padding: 4px 12px;
      background: rgba(0,0,0,0.4);
      border-radius: 9999px;
      backdrop-filter: blur(10px);
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- 窗外清晰度控制 -->

    <button class="btn" onclick="setClarity('soft')">柔和</button>
    <button class="btn" onclick="setClarity('natural')">自然</button>
    <button class="btn" onclick="setClarity('sharp')">通透</button>
    <button class="btn" onclick="setClarity('clear')">完全通透</button>
  </div>

  <!-- 环境白噪音控制 -->
  <div class="ui audio-bar">
    <span class="audio-label" data-i18n="audio_label">环境声</span>
    <button class="sound-btn" id="sound-toggle" onclick="toggleSound()">🔇</button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.6" oninput="setVolume(this.value)">
  </div>

  <!-- 全屏按钮 -->

  <!-- 语言切换器 -->
  <div class="ui lang-switcher">
    <span class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">中</span>
    <span class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</span>
    <span class="lang-btn" data-lang="vi" onclick="setLanguage('vi')">VI</span>
    <span class="lang-btn" data-lang="ko" onclick="setLanguage('ko')">한국</span>
  </div>

  <div class="ui hint" data-i18n="hint">
    点击风景切换世界 &nbsp;•&nbsp; 清晰度控制玻璃后的朦胧感<br>
    全屏按钮提升沉浸感 &nbsp;•&nbsp; 控制台可随意微调 <span style="font-family:monospace">fx.options</span>
  </div>

  <div class="ui status" id="status" data-i18n="status_ready">正在加载玻璃窗引擎...</div>

  <script src="./base-repo/bundle/index.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const effectsCanvas = document.getElementById('effects-canvas');
    const effectsCtx = effectsCanvas.getContext('2d', { alpha: true });

    const statusEl = document.getElementById('status');
    const titleEl = document.getElementById('scene-title');
    const subtitleEl = document.getElementById('scene-subtitle');

    let effectsAnimationFrame = null;
    let mouseX = 0.5;
    let mouseY = 0.5;

    // ==================== 场景数据库 ====================
    // 每个场景都有专属推荐的雨/雾/光影参数，切换时自动应用
    const scenes = {
      'night-rain': {

        }
      },
      'forest-dusk': {

        subtitle: '蓝调时分的森林呼吸',
        background: './assets/scenes-v2/forest-dusk-v2.jpg',
        options: {
          spawnSize: [28, 55], spawnInterval: [0.09, 0.19], dropletsPerSeconds: 290,
          mistColor: [0.006, 0.009, 0.012, 0.78], refractBase: 0.30, refractScale: 0.46,
          gravity: 1720, mistTime: 22, raindropDiffuseLight: [0.18, 0.22, 0.18]
        }
      },
      'bamboo-rain': {
        name: '竹林细雨',
        subtitle: '江南的竹与雨',
        background: './assets/scenes-v2/bamboo-rain-v2.jpg',
        options: {
          spawnSize: [22, 48], spawnInterval: [0.10, 0.22], dropletsPerSeconds: 240,
          mistColor: [0.007, 0.011, 0.009, 0.72], refractBase: 0.29, refractScale: 0.44,
          gravity: 1580, mistTime: 26, raindropDiffuseLight: [0.16, 0.21, 0.15]
        }
      },
      'stormy-sea': {
        name: '暴风雨海',
        subtitle: '海浪与玻璃的对话',
        background: './assets/scenes-v2/stormy-sea-v2.jpg',
        options: {
          spawnSize: [52, 105], spawnInterval: [0.035, 0.075], dropletsPerSeconds: 780,
          mistColor: [0.014, 0.015, 0.018, 0.96], refractBase: 0.52, refractScale: 0.68,
          gravity: 2950, mistTime: 7, raindropDiffuseLight: [0.25, 0.26, 0.30]
        }
      },
      'alps-morning': {
        name: '阿尔卑斯晨雾',
        subtitle: '雪山与薄雾的安静',
        background: './assets/scenes-v2/alps-morning-v2.jpg',
        options: {
          spawnSize: [18, 38], spawnInterval: [0.14, 0.32], dropletsPerSeconds: 95,
          mistColor: [0.004, 0.006, 0.009, 0.55], refractBase: 0.26, refractScale: 0.38,
          gravity: 980, mistTime: 38, raindropDiffuseLight: [0.32, 0.33, 0.38]
        }
      },
      'mountain-lake': {
        name: '山湖晨光',
        subtitle: '平静湖面与第一缕光',
        background: './assets/scenes-v2/mountain-lake-v2.jpg',
        options: {
          spawnSize: [15, 32], spawnInterval: [0.18, 0.38], dropletsPerSeconds: 60,
          mistColor: [0.003, 0.005, 0.007, 0.42], refractBase: 0.24, refractScale: 0.36,
          gravity: 820, mistTime: 48, raindropDiffuseLight: [0.35, 0.32, 0.28]
        }
      }
    };

    let currentSceneId = 'night-rain';
    let currentLang = 'zh';

    // ==================== 程序化环境白噪音 (Web Audio API) - 增强版 ====================
    class RainAmbience {
      constructor() {
        this.audioContext = null;
        this.isPlaying = false;
        this.masterGain = null;
        this.noiseSource = null;
        this.filters = [];
        this.hissGain = null;
        this.dropTimeout = null;

        this.currentIntensity = 0.55;
        this.targetVolume = 0.65;           // 用户期望的音量
        this.currentSceneType = 'rain';     // rain | forest | sea | mountain | calm

        // 用于更强的场景差异
        this.windGain = null;
        this.windFilter = null;
      }

      async init() {
        if (this.audioContext) return;

        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Master volume
        this.masterGain = this.audioContext.createGain();
        this.masterGain.gain.value = this.targetVolume;
        this.masterGain.connect(this.audioContext.destination);

        // ========== 主雨声层 (持续的雨声嘶嘶声) ==========
        const bufferSize = 2 * this.audioContext.sampleRate;
        const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
        const data = buffer.getChannelData(0);

        // Pink noise
        let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
        for (let i = 0; i < bufferSize; i++) {
          const white = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + white * 0.0555179;
          b1 = 0.99332 * b1 + white * 0.0750759;
          b2 = 0.96900 * b2 + white * 0.1538520;
          b3 = 0.86650 * b3 + white * 0.3104856;
          b4 = 0.55000 * b4 + white * 0.5329522;
          b5 = -0.7616 * b5 - white * 0.0168980;
          data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
          b6 = white * 0.115926;
        }

        this.noiseSource = this.audioContext.createBufferSource();
        this.noiseSource.buffer = buffer;
        this.noiseSource.loop = true;

        let lastNode = this.noiseSource;

        // 低通 - 雨声主体
        const lowpass = this.audioContext.createBiquadFilter();
        lowpass.type = 'lowpass';
        lowpass.frequency.value = 1350;
        lastNode.connect(lowpass);
        lastNode = lowpass;
        this.filters.push(lowpass);

        // 带通 - 雨滴的闪亮感
        const bandpass = this.audioContext.createBiquadFilter();
        bandpass.type = 'bandpass';
        bandpass.frequency.value = 2100;
        bandpass.Q.value = 0.65;
        lastNode.connect(bandpass);
        lastNode = bandpass;
        this.filters.push(bandpass);

        this.hissGain = this.audioContext.createGain();
        this.hissGain.gain.value = 0.75;
        lastNode.connect(this.hissGain);
        this.hissGain.connect(this.masterGain);

        // ========== 风声层（用于山景、森林等） ==========
        const windBuffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
        const windData = windBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          windData[i] = Math.random() * 2 - 1;
        }

        const windSource = this.audioContext.createBufferSource();
        windSource.buffer = windBuffer;
        windSource.loop = true;

        this.windFilter = this.audioContext.createBiquadFilter();
        this.windFilter.type = 'lowpass';
        this.windFilter.frequency.value = 420;

        this.windGain = this.audioContext.createGain();
        this.windGain.gain.value = 0; // 默认关闭

        windSource.connect(this.windFilter);
        this.windFilter.connect(this.windGain);
        this.windGain.connect(this.masterGain);

        windSource.start();
        this.windSource = windSource; // 保存以便后续控制
      }

      async start() {
        if (this.isPlaying) return;
        await this.init();

        if (this.audioContext.state === 'suspended') {
          await this.audioContext.resume();
        }

        this.noiseSource.start();
        this.isPlaying = true;
        this._startDrops();
        this.setIntensity(this.currentIntensity);
      }

      stop() {
        if (!this.isPlaying) return;

        this.noiseSource.stop();
        this._stopDrops();

        // Recreate noise source for next play
        this.noiseSource = null;
        this.isPlaying = false;
      }

      setVolume(volume) {
        this.targetVolume = Math.max(0, Math.min(1, parseFloat(volume)));

        if (this.masterGain) {
          this.masterGain.gain.value = this.targetVolume;
        }
      }

      setIntensity(intensity) {
        this.currentIntensity = Math.max(0, Math.min(1, intensity));

        if (!this.hissGain || !this.filters.length) return;

        const scene = this.currentSceneType;

        // 基础雨声强度
        let hissVol = 0.35 + this.currentIntensity * 0.75;
        let lowpassFreq = this._getBaseLowpass(scene);
        let bandpassFreq = this._getBaseBandpass(scene);

        // 根据场景大幅调整特征
        if (scene === 'sea') {
          hissVol *= 1.1;
          lowpassFreq *= 0.75;
        } else if (scene === 'mountain' || scene === 'calm') {
          hissVol *= 0.65;
          lowpassFreq *= 1.15;
        } else if (scene === 'forest') {
          hissVol *= 0.9;
        }

        this.hissGain.gain.value = hissVol;
        this.filters[0].frequency.value = lowpassFreq + this.currentIntensity * 600;
        if (this.filters[1]) {
          this.filters[1].frequency.value = bandpassFreq + this.currentIntensity * 900;
        }

        // 风声层（山景和森林更明显）
        if (this.windGain) {
          let windVol = 0;
          if (scene === 'mountain') windVol = 0.35 + this.currentIntensity * 0.45;
          else if (scene === 'forest') windVol = 0.18 + this.currentIntensity * 0.32;
          else if (scene === 'calm') windVol = 0.12 + this.currentIntensity * 0.25;
          else if (scene === 'sea') windVol = 0.08 + this.currentIntensity * 0.2;

          this.windGain.gain.value = windVol;
          if (this.windFilter) {
            this.windFilter.frequency.value = (scene === 'sea' || scene === 'mountain') ? 380 : 520;
          }
        }
      }

      setSceneType(type) {
        this.currentSceneType = type;

        if (this.isPlaying) {
          // 重新应用当前强度，让场景特征立即生效
          this.setIntensity(this.currentIntensity);
        }
      }

      _getBaseLowpass(scene) {
        if (scene === 'sea') return 850;
        if (scene === 'mountain') return 1550;
        if (scene === 'calm') return 1650;
        if (scene === 'forest') return 1250;
        return 1320;
      }

      _getBaseBandpass(scene) {
        if (scene === 'sea') return 1650;
        if (scene === 'mountain') return 2650;
        if (scene === 'calm') return 2800;
        if (scene === 'forest') return 2300;
        return 2100;
      }

      _startDrops() {
        this._stopDrops();

        const scheduleDrop = () => {
          if (!this.isPlaying || !this.audioContext) return;

          const intensity = this.currentIntensity;
          if (intensity < 0.15) {
            // very light rain — rare drops
            this.dropTimeout = setTimeout(scheduleDrop, 800 + Math.random() * 1200);
            return;
          }

          this._playDrop(intensity);

          // Dynamic interval based on intensity
          const baseInterval = 140 - intensity * 90;
          const next = baseInterval + Math.random() * (90 - intensity * 50);
          this.dropTimeout = setTimeout(scheduleDrop, next);
        };

        scheduleDrop();
      }

      _stopDrops() {
        if (this.dropTimeout) {
          clearTimeout(this.dropTimeout);
          this.dropTimeout = null;
        }
      }

      _playDrop(intensity) {
        if (!this.audioContext) return;

        const scene = this.currentSceneType;
        let duration = 0.07 + Math.random() * 0.11;
        let freqMin = 620;
        let freqMax = 1550;
        let q = 1.1;

        // 根据场景改变雨滴质感
        if (scene === 'sea') {
          duration *= 1.35;
          freqMin = 420;
          freqMax = 980;
          q = 0.8;
        } else if (scene === 'mountain' || scene === 'calm') {
          duration *= 0.75;
          freqMin = 980;
          freqMax = 2400;
          q = 1.6;
        } else if (scene === 'forest') {
          freqMin = 750;
          freqMax = 1750;
        }

        const buffer = this.audioContext.createBuffer(1, this.audioContext.sampleRate * duration, this.audioContext.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        }

        const source = this.audioContext.createBufferSource();
        source.buffer = buffer;

        const filter = this.audioContext.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = freqMin + Math.random() * (freqMax - freqMin);
        filter.Q.value = q;

        const dropGain = this.audioContext.createGain();
        let peak = (0.55 + intensity * 0.85) * (0.65 + Math.random() * 0.55);

        // 山景和森林的雨滴更清脆
        if (scene === 'mountain' || scene === 'calm') peak *= 0.85;
        if (scene === 'sea') peak *= 1.15;

        dropGain.gain.value = peak;

        const envelope = this.audioContext.createGain();

        source.connect(filter);
        filter.connect(dropGain);
        dropGain.connect(envelope);
        envelope.connect(this.masterGain);

        const now = this.audioContext.currentTime;
        envelope.gain.value = peak;
        envelope.gain.linearRampToValueAtTime(0.0001, now + duration * 1.1);

        source.start(now);
      }
    }

    let fogOffset = 0;

    let particles = [];

    function initAtmosphereParticles(sceneId) {
      particles = [];
      const count = (sceneId === 'forest-dusk' || sceneId === 'bamboo-rain') ? 18 : 
                    (sceneId === 'mountain-lake' || sceneId === 'alps-morning') ? 12 : 8;

      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random(),
          y: Math.random() * 0.7 + 0.15,
          size: Math.random() * 2.5 + 0.8,
          speed: Math.random() * 0.0008 + 0.0003,
          opacity: Math.random() * 0.4 + 0.15,
          type: (sceneId === 'forest-dusk' || sceneId === 'bamboo-rain') ? 'leaf' : 'speck'
        });
      }
    }

    function drawAtmosphere() {
      if (!effectsCtx || !effectsCanvas) return;

      const w = effectsCanvas.width;
      const h = effectsCanvas.height;

      effectsCtx.clearRect(0, 0, w, h);

      const currentScene = currentSceneId;
      fogOffset += 0.0004;

      // === 柔和漂浮雾气层 ===
      effectsCtx.fillStyle = 'rgba(220, 225, 235, 0.18)';
      effectsCtx.globalAlpha = (currentScene === 'alps-morning' || currentScene === 'mountain-lake') ? 0.32 : 0.22;

      for (let i = 0; i < 5; i++) {
        const y = (h * (0.2 + i * 0.15) + Math.sin(fogOffset * 0.6 + i) * 25) % (h * 1.1);
        effectsCtx.fillRect(0, y, w, h * 0.22);
      }

      effectsCtx.globalAlpha = 1;

      // === 场景粒子 (树叶 / 光尘 / 雪花感) ===
      particleTime += 1;

      effectsCtx.fillStyle = (currentScene === 'alps-morning' || currentScene === 'mountain-lake') 
        ? 'rgba(245, 248, 255, 0.7)' 
        : 'rgba(200, 210, 180, 0.65)';

      particles.forEach((p, index) => {
        p.y += p.speed * (currentScene.includes('mountain') || currentScene.includes('lake') ? 0.6 : 1.4);
        if (p.y > 0.95) p.y = 0.08;

        // 轻微水平飘动
        const drift = Math.sin(particleTime * 0.015 + index) * 0.0018;
        const drawX = (p.x + drift + mouseX * 0.015 - 0.0075) * w;
        const drawY = p.y * h;

        if (p.type === 'leaf') {
          // 简单树叶形状
          effectsCtx.save();
          effectsCtx.translate(drawX, drawY);
          effectsCtx.rotate(Math.sin(particleTime * 0.02 + index) * 0.6);
          effectsCtx.fillRect(-p.size * 1.8, -p.size * 0.6, p.size * 3.6, p.size * 1.2);
          effectsCtx.restore();
        } else {
          effectsCtx.fillRect(drawX, drawY, p.size, p.size);
        }
      });

      // 额外光晕 / 体积光 (只在晨光和山景)
      if (currentScene === 'mountain-lake' || currentScene === 'alps-morning') {
        effectsCtx.fillStyle = 'rgba(255, 235, 200, 0.08)';
        const lightX = w * (0.3 + Math.sin(particleTime * 0.004) * 0.1);
        effectsCtx.fillRect(lightX, h * 0.1, w * 0.4, h * 0.55);
      }

      effectsAnimationFrame = requestAnimationFrame(drawAtmosphere);
    }

    function startAtmosphere(sceneId) {
      if (effectsAnimationFrame) cancelAnimationFrame(effectsAnimationFrame);
      initAtmosphereParticles(sceneId);
      drawAtmosphere();
    }

      canvas.style.height = '100%';

      // Effects canvas

      effectsCanvas.height = window.innerHeight * dpr;

      if (!scenes[sceneId] || !window.fx) return;

      currentSceneId = sceneId;
      const scene = scenes[sceneId];

      titleEl.textContent = scene.name;
      subtitleEl.textContent = scene.subtitle + ' · Vibe Coding';

      await window.fx.setBackground(scene.background);

      const o = window.fx.options;
      Object.assign(o, scene.options);

      // 同步环境声音
      updateAmbienceForScene(sceneId);

      // 启动大气效果层（让风景有生命）
      startAtmosphere(sceneId);

      console.log(`%c[窗景] 已切换至「${scene.name}」`, 'color:#64748b');

    async function toggleSound() {
      if (!ambience) ambience = new RainAmbience();

      const btn = document.getElementById('sound-toggle');

      if (!ambience.isPlaying) {
        await ambience.start();
        btn.textContent = '🔊';

    function setVolume(value) {
      const vol = parseFloat(value);

      // 无论声音是否已开启，都记录用户想要的音量
      if (ambience) {
        ambience.setVolume(vol);
      } else {
        // 还没创建实例时，先创建一个（但不播放）

        ambience.targetVolume = vol;

      // 同步滑块显示（防止某些情况不同步）

    // 根据场景和清晰度智能调整环境声
    function updateAmbienceForScene(sceneId, clarityLevel = null) {
      if (!ambience || !ambience.isPlaying) return;

      let sceneType = 'rain';
      let intensity = 0.55;

      switch (sceneId) {
        case 'stormy-sea':
          sceneType = 'sea';
          intensity = 0.85;
          break;
        case 'night-rain':
        case 'bamboo-rain':
          sceneType = 'rain';
          intensity = 0.65;
          break;
        case 'forest-dusk':
          sceneType = 'forest';
          intensity = 0.5;
          break;
        case 'alps-morning':
          sceneType = 'mountain';
          intensity = 0.35;
          break;
        case 'mountain-lake':
          sceneType = 'calm';
          intensity = 0.22;
          break;
      }

      // 根据清晰度进一步调整（越通透 = 雨声越轻）
      if (clarityLevel) {
        const clarityMap = { 
          dreamy: 1.0, 
          soft: 0.85, 
          natural: 0.7, 
          sharp: 0.35,
          clear: 0.08   // 完全通透时环境声几乎消失
        };
        intensity *= (clarityMap[clarityLevel] || 0.7);
      }

      ambience.setSceneType(sceneType);
      ambience.setIntensity(intensity);
    }

    // ==================== 新功能：窗外清晰度 + 全屏 ====================

    // 窗外清晰度控制（核心是 background 模糊 + 雨滴折射强度）
    function setClarity(level) {
      if (!window.fx) return;
      const o = window.fx.options;

      switch (level) {
        case 'dreamy':
          o.backgroundBlurSteps = 4;
          o.refractBase = 0.55;
          o.refractScale = 0.82;
          if (o.mistColor) o.mistColor[3] = Math.min((o.mistColor[3] || 0.7) + 0.12, 0.98);
          break;
        case 'soft':
          o.backgroundBlurSteps = 3;
          o.refractBase = 0.42;
          o.refractScale = 0.62;
          break;
        case 'natural':
          o.backgroundBlurSteps = 2;
          o.refractBase = 0.32;
          o.refractScale = 0.48;
          break;
        case 'sharp':
          o.backgroundBlurSteps = 1;
          o.refractBase = 0.22;
          o.refractScale = 0.32;
          if (o.mistColor) o.mistColor[3] = Math.max((o.mistColor[3] || 0.7) - 0.18, 0.12);
          break;

        case 'clear':  // 完全通透 - 几乎没有雨和雾
          o.backgroundBlurSteps = 0;
          o.refractBase = 0.08;
          o.refractScale = 0.15;
          if (o.mistColor) o.mistColor[3] = 0.04;

          // 同时大幅降低实际雨滴数量，让玻璃真正“干净”
          o.spawnSize = [6, 14];
          o.spawnInterval = [0.35, 0.8];
          o.dropletsPerSeconds = 8;
          o.gravity = 600;
          o.mistTime = 80;
          break;
      }

      // 强制重新处理背景纹理，让模糊和折射变化立即生效
      const bg = scenes[currentSceneId].background;
      window.fx.setBackground(bg);

      // 同步环境声音强度
      updateAmbienceForScene(currentSceneId, level);

      console.log(`%c[窗景] 清晰度已调整为「${level}」`, 'color:#64748b');
    }

    // 全屏沉浸模式
    function toggleFullscreen() {
      const elem = document.documentElement;

      if (!document.fullscreenElement) {
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    }

    async function init() {
      currentSceneId = 'night-rain';
      currentLang = 'zh';
      applyLanguage('zh');   // 初始化语言

      await startRain({ ...scenes['night-rain'].options });

      document.querySelectorAll('.scene-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.scene === 'night-rain');
      });

      // 预初始化环境声音
      ambience = new RainAmbience();

      // 读取当前滑块值作为初始音量
      const slider = document.getElementById('volume-slider');
      if (slider) {
        ambience.targetVolume = parseFloat(slider.value);
      }

      updateAmbienceForScene('night-rain', 'natural');

      // 启动初始大气效果
      startAtmosphere('night-rain');

      setTimeout(() => { if (statusEl) statusEl.style.opacity = '0.35'; }, 2800);

      console.log('%c[窗景] 已就绪！支持多语言切换（右上角），也可以在控制台微调 fx.options', 'color:#64748b');
    }

    window.addEventListener('load', init);
    window.switchScene = switchScene;
    window.setMood = setMood;
    window.setClarity = setClarity;
    window.toggleFullscreen = toggleFullscreen;
    window.setLanguage = setLanguage;
  </script>
</body>
</html>
